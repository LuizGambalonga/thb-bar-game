<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 22" shape-rendering="crispEdges">
  <!-- RAPOSA NEON: orelhas pontudas + cauda são inconfundíveis -->
  <!-- ORELHAS pontudas (silhueta definidora) -->
  <rect x="3" y="0" width="4" height="7" fill="#b8ccff"/>
  <rect x="4" y="1" width="2" height="5" fill="#dd44ff"/>
  <rect x="17" y="0" width="4" height="7" fill="#b8ccff"/>
  <rect x="18" y="1" width="2" height="5" fill="#dd44ff"/>
  <!-- CABEÇA -->
  <rect x="5" y="5" width="14" height="10" fill="#b8ccff"/>
  <rect x="6" y="6" width="12" height="8" fill="#ddeeff"/>
  <!-- FOCINHO (mais escuro) -->
  <rect x="8" y="11" width="8" height="4" fill="#8899cc"/>
  <rect x="9" y="12" width="6" height="2" fill="#6677aa"/>
  <!-- Nariz neon -->
  <rect x="11" y="11" width="2" height="2" fill="#dd44ff"/>
  <!-- OLHOS neon brilhantes -->
  <rect x="7" y="7" width="3" height="3" fill="#dd44ff"/>
  <rect x="14" y="7" width="3" height="3" fill="#dd44ff"/>
  <rect x="7" y="7" width="1" height="1" fill="#ffffff"/>
  <rect x="14" y="7" width="1" height="1" fill="#ffffff"/>
  <!-- CORPO compacto -->
  <rect x="6" y="15" width="12" height="7" fill="#b8ccff"/>
  <rect x="7" y="16" width="10" height="5" fill="#ddeeff"/>
  <!-- CAUDA longa e brilhante (arremata à direita) -->
  <rect x="18" y="12" width="6" height="5" fill="#b8ccff"/>
  <rect x="20" y="10" width="4" height="4" fill="#ddeeff"/>
  <rect x="21" y="8" width="3" height="3" fill="#b8ccff"/>
  <rect x="22" y="6" width="2" height="3" fill="#8899cc"/>
  <!-- Tip da cauda neon -->
  <rect x="22" y="5" width="2" height="3" fill="#dd44ff"/>
  <!-- PATAS -->
  <rect x="7" y="22" width="3" height="2" fill="#8899cc"/>
  <rect x="14" y="22" width="3" height="2" fill="#8899cc"/>
</svg>
