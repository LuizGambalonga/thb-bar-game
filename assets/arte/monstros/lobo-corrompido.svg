<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 24" shape-rendering="crispEdges">
  <!-- LOBO CORROMPIDO: cabeça de lobo, orelhas pontuadas, focinho -->
  <!-- ORELHAS pontudas (silhueta inconfundível de lobo) -->
  <rect x="3" y="0" width="6" height="8" fill="#556688"/>
  <rect x="4" y="1" width="4" height="6" fill="#7788aa"/>
  <rect x="5" y="2" width="2" height="4" fill="#3355ff" opacity="0.5"/>
  <rect x="17" y="0" width="6" height="8" fill="#556688"/>
  <rect x="18" y="1" width="4" height="6" fill="#7788aa"/>
  <rect x="19" y="2" width="2" height="4" fill="#3355ff" opacity="0.5"/>
  <!-- CABEÇA maciça de lobo -->
  <rect x="3" y="6" width="20" height="14" fill="#556688"/>
  <rect x="4" y="7" width="18" height="12" fill="#7788aa"/>
  <!-- FOCINHO projetado à frente -->
  <rect x="6" y="14" width="14" height="6" fill="#445577"/>
  <rect x="7" y="15" width="12" height="4" fill="#667799"/>
  <!-- OLHOS azuis sobrenaturais (corrompido) -->
  <rect x="5" y="9" width="5" height="4" fill="#3355ff"/>
  <rect x="16" y="9" width="5" height="4" fill="#3355ff"/>
  <rect x="6" y="10" width="3" height="2" fill="#8899ff"/>
  <rect x="17" y="10" width="3" height="2" fill="#8899ff"/>
  <rect x="6" y="10" width="1" height="1" fill="#ffffff"/>
  <rect x="17" y="10" width="1" height="1" fill="#ffffff"/>
  <!-- Nariz (narinas) -->
  <rect x="11" y="14" width="4" height="2" fill="#334455"/>
  <rect x="12" y="14" width="2" height="1" fill="#223344"/>
  <!-- PRESAS visíveis -->
  <rect x="8" y="19" width="2" height="4" fill="#ccddee"/>
  <rect x="11" y="19" width="2" height="3" fill="#ccddee"/>
  <rect x="14" y="19" width="2" height="3" fill="#ccddee"/>
  <rect x="16" y="19" width="2" height="4" fill="#ccddee"/>
  <!-- Marcas de corrupção (azul brilhante) -->
  <rect x="4" y="7" width="5" height="2" fill="#3355ff" opacity="0.4"/>
  <rect x="17" y="7" width="5" height="2" fill="#3355ff" opacity="0.4"/>
  <rect x="8" y="14" width="10" height="1" fill="#3355ff" opacity="0.3"/>
</svg>
