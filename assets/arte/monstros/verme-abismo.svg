<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" shape-rendering="crispEdges">
  <!-- VERME DO ABISMO: boca enorme circular, mandíbulas, boss -->
  <!-- BOCA circular frontal (elemento dominante) -->
  <rect x="4" y="4" width="20" height="20" rx="2" fill="#1a0030"/>
  <rect x="5" y="5" width="18" height="18" rx="1" fill="#7a1aaa"/>
  <rect x="7" y="7" width="14" height="14" fill="#993dcc"/>
  <!-- Interior da garganta (buraco de trevas) -->
  <rect x="9" y="9" width="10" height="10" fill="#0a0015"/>
  <rect x="10" y="10" width="8" height="8" fill="#1a0030"/>
  <!-- Espiral hipnótica no interior -->
  <rect x="11" y="11" width="6" height="1" fill="#7a1aaa" opacity="0.7"/>
  <rect x="11" y="13" width="6" height="1" fill="#7a1aaa" opacity="0.7"/>
  <rect x="11" y="15" width="6" height="1" fill="#7a1aaa" opacity="0.7"/>
  <rect x="11" y="11" width="1" height="6" fill="#7a1aaa" opacity="0.7"/>
  <rect x="16" y="11" width="1" height="6" fill="#7a1aaa" opacity="0.7"/>
  <!-- DENTES/MANDÍBULAS (anel ao redor da boca) -->
  <rect x="5" y="4" width="3" height="5" fill="#dd88ff"/>
  <rect x="10" y="3" width="3" height="5" fill="#dd88ff"/>
  <rect x="15" y="3" width="3" height="5" fill="#dd88ff"/>
  <rect x="20" y="4" width="3" height="5" fill="#dd88ff"/>
  <rect x="5" y="19" width="3" height="5" fill="#dd88ff"/>
  <rect x="10" y="20" width="3" height="5" fill="#dd88ff"/>
  <rect x="15" y="20" width="3" height="5" fill="#dd88ff"/>
  <rect x="20" y="19" width="3" height="5" fill="#dd88ff"/>
  <!-- Dentes laterais -->
  <rect x="3" y="9" width="4" height="3" fill="#dd88ff"/>
  <rect x="3" y="16" width="4" height="3" fill="#dd88ff"/>
  <rect x="21" y="9" width="4" height="3" fill="#dd88ff"/>
  <rect x="21" y="16" width="4" height="3" fill="#dd88ff"/>
  <!-- OLHOS no topo (pequenos mas brilhantes) -->
  <rect x="7" y="6" width="4" height="3" fill="#ff2222"/>
  <rect x="17" y="6" width="4" height="3" fill="#ff2222"/>
  <rect x="7" y="6" width="2" height="2" fill="#ff8888"/>
  <rect x="17" y="6" width="2" height="2" fill="#ff8888"/>
</svg>
