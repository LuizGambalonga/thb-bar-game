<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" shape-rendering="crispEdges">
  <!-- GRUB BINÁRIO: lagarta segmentada verde -->
  <!-- Cabeça grande e brilhante -->
  <rect x="14" y="2" width="10" height="10" rx="2" fill="#3ecf5e"/>
  <rect x="15" y="3" width="8" height="8" fill="#5af07a"/>
  <!-- Olhos brilhantes (código binário) -->
  <rect x="16" y="5" width="3" height="3" fill="#ffee44"/>
  <rect x="20" y="5" width="3" height="3" fill="#ffee44"/>
  <rect x="16" y="5" width="1" height="1" fill="#ffffff"/>
  <rect x="20" y="5" width="1" height="1" fill="#ffffff"/>
  <!-- Boca sorridente -->
  <rect x="16" y="9" width="6" height="1" fill="#186e2e"/>
  <!-- Antenas -->
  <rect x="17" y="0" width="1" height="3" fill="#3ecf5e"/>
  <rect x="21" y="1" width="1" height="2" fill="#3ecf5e"/>
  <rect x="16" y="0" width="2" height="1" fill="#78f59a"/>
  <rect x="21" y="0" width="2" height="1" fill="#78f59a"/>
  <!-- CORPO SEGMENTADO (3 segmentos, claramente uma lagarta) -->
  <rect x="9" y="5" width="7" height="8" rx="2" fill="#3ecf5e"/>
  <rect x="10" y="6" width="5" height="6" fill="#5af07a"/>
  <!-- Divisor de segmento -->
  <rect x="14" y="5" width="1" height="8" fill="#186e2e"/>
  <rect x="3" y="7" width="8" height="7" rx="2" fill="#3ecf5e"/>
  <rect x="4" y="8" width="6" height="5" fill="#5af07a"/>
  <rect x="9" y="7" width="1" height="7" fill="#186e2e"/>
  <!-- Patas -->
  <rect x="5" y="14" width="2" height="3" fill="#186e2e"/>
  <rect x="9" y="14" width="2" height="3" fill="#186e2e"/>
  <rect x="13" y="13" width="2" height="3" fill="#186e2e"/>
  <rect x="17" y="12" width="2" height="3" fill="#186e2e"/>
  <!-- Cauda -->
  <rect x="0" y="9" width="4" height="5" rx="1" fill="#3ecf5e"/>
  <rect x="1" y="10" width="3" height="3" fill="#5af07a"/>
</svg>
