<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 28" shape-rendering="crispEdges">
  <!-- ESPECTRO ZUMBI: fantasma flutuante, forma inconfundível -->
  <!-- CABEÇA arredondada (topo do fantasma) -->
  <rect x="4" y="1" width="12" height="2" fill="#66bb88"/>
  <rect x="2" y="3" width="16" height="10" fill="#66bb88"/>
  <rect x="3" y="2" width="14" height="10" fill="#99ddaa"/>
  <!-- Olhos vermelhos assustadores -->
  <rect x="4" y="5" width="4" height="4" fill="#ee3333"/>
  <rect x="12" y="5" width="4" height="4" fill="#ee3333"/>
  <rect x="4" y="5" width="2" height="2" fill="#ff8888"/>
  <rect x="12" y="5" width="2" height="2" fill="#ff8888"/>
  <!-- Boca assustada/faminta -->
  <rect x="5" y="10" width="10" height="2" fill="#335544"/>
  <rect x="6" y="10" width="1" height="3" fill="#335544"/>
  <rect x="8" y="10" width="1" height="3" fill="#335544"/>
  <rect x="10" y="10" width="1" height="3" fill="#335544"/>
  <rect x="12" y="10" width="1" height="3" fill="#335544"/>
  <!-- CORPO flutuante (estreita no meio) -->
  <rect x="3" y="13" width="14" height="8" fill="#66bb88"/>
  <rect x="4" y="14" width="12" height="6" fill="#88cc99"/>
  <!-- CAUDA fantasmagórica (3 pontas) — SILHUETA ÚNICA -->
  <rect x="2" y="21" width="4" height="5" fill="#66bb88"/>
  <rect x="8" y="21" width="4" height="7" fill="#66bb88"/>
  <rect x="14" y="21" width="4" height="5" fill="#66bb88"/>
  <!-- Brilho translúcido -->
  <rect x="5" y="14" width="4" height="6" fill="#55ff99" opacity="0.3"/>
  <!-- Rastro ectoplasma -->
  <rect x="4" y="26" width="2" height="2" fill="#66bb88" opacity="0.5"/>
  <rect x="14" y="26" width="2" height="2" fill="#66bb88" opacity="0.5"/>
</svg>
