<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 20" shape-rendering="crispEdges">
  <!-- MORCEGO VIRAL: asas abertas são a silhueta -->
  <!-- ASA ESQUERDA (grande, dominante) -->
  <rect x="0" y="3" width="7" height="10" fill="#993dbf"/>
  <rect x="1" y="4" width="5" height="8" fill="#cc77ff"/>
  <!-- Dedos da asa esquerda -->
  <rect x="0" y="2" width="2" height="4" fill="#7a2a9a"/>
  <rect x="2" y="1" width="2" height="4" fill="#7a2a9a"/>
  <rect x="4" y="0" width="2" height="4" fill="#7a2a9a"/>
  <!-- Membrana da asa -->
  <rect x="0" y="6" width="7" height="4" fill="#bb55ee" opacity="0.7"/>

  <!-- CORPO central (pequeno vs asas) -->
  <rect x="7" y="4" width="8" height="12" fill="#993dbf"/>
  <rect x="8" y="5" width="6" height="10" fill="#cc77ff"/>
  <!-- CABEÇA com orelhas -->
  <rect x="8" y="2" width="6" height="4" fill="#993dbf"/>
  <!-- Orelhas pontudas de morcego -->
  <rect x="7" y="0" width="3" height="5" fill="#7a2a9a"/>
  <rect x="12" y="0" width="3" height="5" fill="#7a2a9a"/>
  <!-- OLHOS vermelhos (vírus) -->
  <rect x="9" y="6" width="2" height="2" fill="#ff2222"/>
  <rect x="11" y="6" width="2" height="2" fill="#ff2222"/>
  <rect x="9" y="6" width="1" height="1" fill="#ff8888"/>
  <rect x="11" y="6" width="1" height="1" fill="#ff8888"/>
  <!-- Boca com presas -->
  <rect x="9" y="9" width="4" height="2" fill="#5a1a7a"/>
  <rect x="9" y="9" width="1" height="3" fill="#ffddff"/>
  <rect x="12" y="9" width="1" height="3" fill="#ffddff"/>

  <!-- ASA DIREITA (grande, dominante) -->
  <rect x="15" y="3" width="7" height="10" fill="#993dbf"/>
  <rect x="16" y="4" width="5" height="8" fill="#cc77ff"/>
  <!-- Dedos da asa direita -->
  <rect x="20" y="2" width="2" height="4" fill="#7a2a9a"/>
  <rect x="18" y="1" width="2" height="4" fill="#7a2a9a"/>
  <rect x="16" y="0" width="2" height="4" fill="#7a2a9a"/>
  <rect x="15" y="6" width="7" height="4" fill="#bb55ee" opacity="0.7"/>

  <!-- PATAS e cauda -->
  <rect x="9" y="16" width="2" height="4" fill="#7a2a9a"/>
  <rect x="11" y="16" width="2" height="4" fill="#7a2a9a"/>
  <rect x="10" y="18" width="2" height="2" fill="#993dbf"/>
</svg>
