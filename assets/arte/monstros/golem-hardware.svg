<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 26" shape-rendering="crispEdges">
  <!-- GOLEM DE HARDWARE: robótico, blocky, bossão final -->
  <!-- OMBROS QUADRADOS (identidade robótica) -->
  <rect x="0" y="5" width="7" height="10" fill="#334455"/>
  <rect x="1" y="6" width="5" height="8" fill="#556677"/>
  <rect x="21" y="5" width="7" height="10" fill="#334455"/>
  <rect x="22" y="6" width="5" height="8" fill="#556677"/>
  <!-- CABEÇA quadrada grande -->
  <rect x="5" y="1" width="18" height="16" fill="#556677"/>
  <rect x="6" y="2" width="16" height="14" fill="#7788aa"/>
  <!-- VISOR de CPU (o elemento mais icônico) -->
  <rect x="7" y="5" width="14" height="7" fill="#55eeff"/>
  <rect x="8" y="6" width="12" height="5" fill="#88ffff"/>
  <!-- Grade do visor -->
  <rect x="7" y="7" width="14" height="1" fill="#33ccdd" opacity="0.7"/>
  <rect x="10" y="5" width="1" height="7" fill="#33ccdd" opacity="0.7"/>
  <rect x="13" y="5" width="1" height="7" fill="#33ccdd" opacity="0.7"/>
  <rect x="16" y="5" width="1" height="7" fill="#33ccdd" opacity="0.7"/>
  <!-- Brilho do visor (energia) -->
  <rect x="8" y="6" width="5" height="2" fill="#ffffff" opacity="0.5"/>
  <!-- ANTENAS (componentes de hardware) -->
  <rect x="8" y="0" width="2" height="3" fill="#aabbcc"/>
  <rect x="18" y="0" width="2" height="3" fill="#aabbcc"/>
  <rect x="7" y="0" width="4" height="1" fill="#55eeff"/>
  <rect x="17" y="0" width="4" height="1" fill="#55eeff"/>
  <!-- BOCAL (grade de ventilação) -->
  <rect x="8" y="13" width="12" height="4" fill="#334455"/>
  <rect x="9" y="14" width="2" height="2" fill="#55eeff" opacity="0.5"/>
  <rect x="12" y="14" width="2" height="2" fill="#55eeff" opacity="0.5"/>
  <rect x="15" y="14" width="2" height="2" fill="#55eeff" opacity="0.5"/>
  <rect x="18" y="14" width="2" height="2" fill="#55eeff" opacity="0.5"/>
  <!-- TORSO com placa de circuito -->
  <rect x="5" y="17" width="18" height="9" fill="#445566"/>
  <rect x="6" y="18" width="16" height="7" fill="#556677"/>
  <!-- Circuitos (traços verdes — RAM/CPU) -->
  <rect x="7" y="19" width="8" height="1" fill="#22cc44"/>
  <rect x="12" y="20" width="7" height="1" fill="#22cc44"/>
  <rect x="7" y="22" width="5" height="1" fill="#22cc44"/>
  <rect x="14" y="22" width="5" height="1" fill="#22cc44"/>
  <rect x="7" y="19" width="1" height="5" fill="#22cc44"/>
  <rect x="20" y="20" width="1" height="4" fill="#22cc44"/>
  <!-- Core de energia (coração do golem) -->
  <rect x="12" y="20" width="4" height="3" fill="#55eeff"/>
  <rect x="13" y="20" width="2" height="3" fill="#aaffff"/>
</svg>
