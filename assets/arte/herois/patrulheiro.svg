<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- ARCO: elemento dominante, curva visível à esquerda -->
  <!-- Corpo do arco (curva externa) -->
  <rect x="1" y="6" width="3" height="28" fill="#7a4a10"/>
  <rect x="0" y="6" width="2" height="4" fill="#5a3008"/>
  <rect x="0" y="30" width="2" height="4" fill="#5a3008"/>
  <rect x="0" y="10" width="1" height="20" fill="#5a3008"/>
  <!-- Corda -->
  <rect x="3" y="6" width="1" height="28" fill="#f0e8d0"/>
  <!-- Virote encaixado (seta pronta) -->
  <rect x="3" y="19" width="8" height="1" fill="#c8a870"/>
  <rect x="3" y="19" width="2" height="1" fill="#e0c880"/>

  <!-- ALJAVA visível (costas) -->
  <rect x="22" y="12" width="5" height="16" rx="1" fill="#5a3008"/>
  <rect x="23" y="10" width="3" height="5" fill="#9acc82"/>
  <rect x="23" y="8" width="3" height="3" fill="#c8e8a8" opacity="0.7"/>

  <!-- CAPUZ LARGO — silhueta do ranger -->
  <rect x="10" y="2" width="14" height="3" fill="#3a9a55"/>
  <rect x="8" y="5" width="18" height="7" fill="#3a9a55"/>
  <!-- Sombra interna do capuz -->
  <rect x="10" y="6" width="14" height="6" fill="#1e5a2e"/>
  <!-- Rosto parcialmente visível -->
  <rect x="11" y="7" width="12" height="6" fill="#f1c27d"/>
  <!-- Olhos de caçador (foco) -->
  <rect x="12" y="9" width="3" height="2" fill="#0d1a0d"/>
  <rect x="17" y="9" width="3" height="2" fill="#0d1a0d"/>
  <rect x="12" y="9" width="1" height="1" fill="#6ee089"/>
  <rect x="17" y="9" width="1" height="1" fill="#6ee089"/>
  <!-- Borda do capuz -->
  <rect x="9" y="12" width="16" height="2" fill="#3a9a55"/>

  <!-- ARMADURA de couro leve -->
  <rect x="10" y="14" width="14" height="3" fill="#3a9a55"/>
  <rect x="10" y="17" width="14" height="14" fill="#6ee089"/>
  <!-- Costuras diagonais -->
  <rect x="10" y="21" width="14" height="1" fill="#3a9a55"/>
  <rect x="10" y="25" width="14" height="1" fill="#3a9a55"/>

  <!-- CINTO de aventureiro -->
  <rect x="10" y="31" width="14" height="3" fill="#5a3008"/>
  <rect x="14" y="30" width="4" height="5" fill="#c79a3a"/>

  <!-- PERNAS -->
  <rect x="10" y="34" width="6" height="12" fill="#3a9a55"/>
  <rect x="18" y="34" width="6" height="12" fill="#3a9a55"/>
  <rect x="10" y="38" width="6" height="8" fill="#1e5a2e"/>
  <rect x="18" y="38" width="6" height="8" fill="#1e5a2e"/>
  <!-- Botas -->
  <rect x="9" y="46" width="8" height="2" fill="#5a3008"/>
  <rect x="17" y="46" width="8" height="2" fill="#5a3008"/>
</svg>
