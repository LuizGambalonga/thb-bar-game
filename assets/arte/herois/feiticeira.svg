<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- CAJADO: elemento dominante, atravessa todo o sprite -->
  <rect x="1" y="0" width="3" height="44" fill="#6a3a10"/>
  <!-- ORB mágico — brilhante, PRIMEIRO a ver -->
  <rect x="0" y="0" width="5" height="5" fill="#c06cff"/>
  <rect x="1" y="0" width="3" height="3" fill="#e0a0ff"/>
  <rect x="1" y="0" width="2" height="2" fill="#ffffff"/>
  <!-- Brilho do orb saindo -->
  <rect x="5" y="1" width="3" height="1" fill="#c06cff" opacity="0.7"/>
  <rect x="5" y="3" width="2" height="1" fill="#c06cff" opacity="0.5"/>

  <!-- CHAPÉU PONTUDO — silhueta imediata -->
  <rect x="16" y="0" width="2" height="2" fill="#2a0a4a"/>
  <rect x="15" y="2" width="4" height="2" fill="#2a0a4a"/>
  <rect x="13" y="4" width="8" height="3" fill="#7a3ab8"/>
  <rect x="11" y="7" width="12" height="3" fill="#7a3ab8"/>
  <!-- Aba larga do chapéu -->
  <rect x="7" y="10" width="20" height="3" fill="#2a0a4a"/>
  <!-- Fivela dourada -->
  <rect x="14" y="8" width="4" height="2" fill="#ffd96a"/>

  <!-- ROSTO (pequeno, feminino) -->
  <rect x="12" y="13" width="8" height="7" fill="#f1c27d"/>
  <!-- Olhos vibrantes -->
  <rect x="13" y="15" width="2" height="2" fill="#c06cff"/>
  <rect x="17" y="15" width="2" height="2" fill="#c06cff"/>
  <rect x="13" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="17" y="15" width="1" height="1" fill="#ffffff"/>

  <!-- GOLA -->
  <rect x="11" y="20" width="10" height="2" fill="#2a0a4a"/>

  <!-- MANTO: estreito no torso, largo na base (leitura imediata) -->
  <rect x="11" y="22" width="10" height="6" fill="#c06cff"/>
  <!-- Detalhe runico -->
  <rect x="12" y="23" width="3" height="4" fill="#e0a0ff" opacity="0.6"/>
  <rect x="17" y="23" width="3" height="4" fill="#e0a0ff" opacity="0.6"/>

  <rect x="9" y="28" width="14" height="5" fill="#7a3ab8"/>
  <rect x="7" y="33" width="18" height="5" fill="#c06cff"/>
  <rect x="6" y="38" width="20" height="5" fill="#7a3ab8"/>
  <!-- Brilho do manto -->
  <rect x="7" y="34" width="3" height="8" fill="#e0a0ff" opacity="0.4"/>
  <rect x="22" y="34" width="3" height="8" fill="#e0a0ff" opacity="0.4"/>

  <!-- BASE: pés em forma de robe -->
  <rect x="8" y="43" width="6" height="4" fill="#2a0a4a"/>
  <rect x="18" y="43" width="6" height="4" fill="#2a0a4a"/>
  <rect x="9" y="45" width="4" height="2" fill="#7a3ab8"/>
  <rect x="19" y="45" width="4" height="2" fill="#7a3ab8"/>
</svg>
