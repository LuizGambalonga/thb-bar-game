<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Chapéu pontudo - a marca da feiticeira -->
  <rect x="15" y="0" width="2" height="2" fill="#2a0a4a"/>
  <rect x="14" y="2" width="4" height="2" fill="#2a0a4a"/>
  <rect x="13" y="4" width="6" height="2" fill="#7a3ab8"/>
  <rect x="12" y="6" width="8" height="2" fill="#7a3ab8"/>
  <rect x="11" y="8" width="10" height="2" fill="#7a3ab8"/>
  <rect x="10" y="10" width="12" height="2" fill="#c06cff"/>
  <!-- Aba do chapéu (larga) -->
  <rect x="7" y="12" width="18" height="2" fill="#2a0a4a"/>
  <!-- Estrela no chapéu -->
  <rect x="14" y="5" width="1" height="3" fill="#ffd96a"/>
  <rect x="13" y="6" width="3" height="1" fill="#ffd96a"/>

  <!-- Rosto (pequeno, feminino) -->
  <rect x="12" y="14" width="8" height="6" fill="#f1c27d"/>
  <!-- Olhos (brilhantes, de bruxa) -->
  <rect x="13" y="16" width="2" height="2" fill="#7a3ab8"/>
  <rect x="17" y="16" width="2" height="2" fill="#7a3ab8"/>
  <!-- Brilho nos olhos -->
  <rect x="13" y="16" width="1" height="1" fill="#e0a0ff"/>
  <rect x="17" y="16" width="1" height="1" fill="#e0a0ff"/>

  <!-- Gola/colarinho -->
  <rect x="11" y="20" width="10" height="2" fill="#2a0a4a"/>

  <!-- Manto (robes) - largo e fluido, estreita no meio -->
  <rect x="11" y="22" width="10" height="4" fill="#c06cff"/>
  <rect x="9" y="26" width="14" height="4" fill="#c06cff"/>
  <rect x="8" y="30" width="16" height="4" fill="#7a3ab8"/>
  <rect x="7" y="34" width="18" height="4" fill="#c06cff"/>
  <rect x="6" y="38" width="20" height="4" fill="#7a3ab8"/>
  <!-- Brilhos do manto -->
  <rect x="12" y="23" width="3" height="8" fill="#e0a0ff"/>
  <!-- Detalhe mágico -->
  <rect x="9" y="27" width="2" height="6" fill="#e0a0ff" opacity="0.6"/>
  <rect x="21" y="27" width="2" height="6" fill="#e0a0ff" opacity="0.6"/>

  <!-- Cajado (staff) - alto, à esquerda -->
  <rect x="4" y="0" width="2" height="44" fill="#5c3a1a"/>
  <rect x="4" y="0" width="2" height="44" fill="none" stroke="#0d0f1a" stroke-width="0.5"/>
  <!-- Orbe do cajado -->
  <rect x="2" y="0" width="6" height="6" rx="3" fill="#c06cff"/>
  <rect x="3" y="1" width="4" height="4" rx="2" fill="#e0a0ff"/>
  <rect x="4" y="1" width="2" height="2" fill="#ffffff"/>
  <!-- Brilho mágico saindo do orbe -->
  <rect x="2" y="6" width="2" height="2" fill="#c06cff" opacity="0.6"/>
  <rect x="6" y="6" width="2" height="2" fill="#c06cff" opacity="0.6"/>

  <!-- Base do manto -->
  <rect x="8" y="42" width="6" height="4" fill="#2a0a4a"/>
  <rect x="18" y="42" width="6" height="4" fill="#2a0a4a"/>
  <!-- Ponteiras decorativas -->
  <rect x="9" y="44" width="4" height="2" fill="#7a3ab8"/>
  <rect x="19" y="44" width="4" height="2" fill="#7a3ab8"/>
</svg>
