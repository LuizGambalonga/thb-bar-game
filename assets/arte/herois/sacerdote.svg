<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Auréola (halo) - o símbolo mais icônico do sacerdote -->
  <rect x="9" y="0" width="14" height="2" fill="#ffd96a" opacity="0.5"/>
  <rect x="7" y="2" width="18" height="1" fill="#ffd96a" opacity="0.7"/>
  <rect x="6" y="3" width="20" height="1" fill="#ffd96a"/>
  <rect x="7" y="4" width="18" height="1" fill="#ffd96a" opacity="0.7"/>
  <!-- Centro da auréola (vazio - aura, não disco sólido) -->
  <rect x="10" y="1" width="12" height="3" fill="#ffd96a" opacity="0.2"/>
  <!-- Brilho da auréola -->
  <rect x="11" y="1" width="10" height="1" fill="#ffffff" opacity="0.6"/>

  <!-- Rosto sereno e bondoso -->
  <rect x="11" y="6" width="10" height="8" fill="#f1c27d"/>
  <!-- Olhos misericordiosos (fechados ou semi-abertos) -->
  <rect x="12" y="9" width="3" height="1" fill="#0d0f1a"/>
  <rect x="17" y="9" width="3" height="1" fill="#0d0f1a"/>
  <!-- Sorriso leve -->
  <rect x="13" y="12" width="6" height="1" fill="#cd9b5f"/>
  <rect x="13" y="13" width="1" height="1" fill="#cd9b5f"/>
  <rect x="18" y="13" width="1" height="1" fill="#cd9b5f"/>

  <!-- Capuz do sacerdote -->
  <rect x="9" y="5" width="14" height="4" fill="#c79a3a" opacity="0.6"/>
  <rect x="10" y="5" width="12" height="2" fill="#c79a3a"/>

  <!-- Gola alta -->
  <rect x="10" y="14" width="12" height="3" fill="#c79a3a"/>

  <!-- Vestes sagradas (robes largos e fluidos, cor dourada) -->
  <rect x="10" y="17" width="12" height="4" fill="#ffd96a"/>
  <!-- Símbolo sagrado no peito -->
  <rect x="15" y="18" width="2" height="6" fill="#c79a3a"/>
  <rect x="13" y="20" width="6" height="2" fill="#c79a3a"/>
  <!-- Borda dourada -->
  <rect x="10" y="17" width="12" height="16" fill="none" stroke="#c79a3a" stroke-width="1"/>

  <!-- Corpo das vestes (mais largo na base) -->
  <rect x="9" y="21" width="14" height="4" fill="#fff4b8"/>
  <rect x="8" y="25" width="16" height="4" fill="#ffd96a"/>
  <rect x="7" y="29" width="18" height="4" fill="#fff4b8"/>
  <rect x="8" y="33" width="16" height="4" fill="#ffd96a"/>

  <!-- Cajado sagrado (à direita, com símbolo no topo) -->
  <rect x="24" y="4" width="2" height="38" fill="#7a5a10"/>
  <!-- Cristal sagrado no topo -->
  <rect x="22" y="2" width="6" height="6" rx="1" fill="#ffd96a"/>
  <rect x="23" y="3" width="4" height="4" fill="#fff4b8"/>
  <rect x="24" y="3" width="2" height="2" fill="#ffffff"/>
  <!-- Cruz no cristal -->
  <rect x="24" y="2" width="2" height="6" fill="#c79a3a" opacity="0.5"/>
  <rect x="22" y="4" width="6" height="2" fill="#c79a3a" opacity="0.5"/>

  <!-- Base das vestes -->
  <rect x="8" y="37" width="7" height="9" fill="#c79a3a"/>
  <rect x="17" y="37" width="7" height="9" fill="#c79a3a"/>
  <!-- Bordado da borda inferior -->
  <rect x="8" y="44" width="7" height="2" fill="#ffd96a"/>
  <rect x="17" y="44" width="7" height="2" fill="#ffd96a"/>
  <!-- Sandálias -->
  <rect x="7" y="46" width="8" height="2" rx="1" fill="#7a5a10"/>
  <rect x="17" y="46" width="8" height="2" rx="1" fill="#7a5a10"/>
</svg>
