<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- AURÉOLA: identificador imediato, brilhante, acima da cabeça -->
  <rect x="8" y="0" width="16" height="2" fill="#ffd96a" opacity="0.6"/>
  <rect x="6" y="1" width="20" height="2" fill="#ffd96a" opacity="0.8"/>
  <rect x="5" y="2" width="22" height="2" fill="#ffd96a"/>
  <rect x="6" y="4" width="20" height="1" fill="#ffd96a" opacity="0.6"/>
  <!-- Interior mais claro (auréola não é sólida) -->
  <rect x="9" y="1" width="14" height="4" fill="#fff4b8" opacity="0.4"/>
  <!-- Brilho máximo no centro -->
  <rect x="13" y="1" width="6" height="2" fill="#ffffff" opacity="0.7"/>

  <!-- CAJADO à direita: elemento de autoridade -->
  <rect x="27" y="5" width="3" height="38" fill="#8a6020"/>
  <!-- Cristal sagrado no topo -->
  <rect x="25" y="2" width="7" height="8" rx="1" fill="#ffd96a"/>
  <rect x="26" y="3" width="5" height="6" fill="#fff4b8"/>
  <!-- Cruz no cristal -->
  <rect x="27" y="2" width="3" height="8" fill="#c79a3a" opacity="0.6"/>
  <rect x="25" y="5" width="7" height="2" fill="#c79a3a" opacity="0.6"/>
  <rect x="28" y="3" width="2" height="3" fill="#ffffff" opacity="0.6"/>

  <!-- ROSTO sereno -->
  <rect x="12" y="6" width="10" height="8" fill="#f1c27d"/>
  <!-- Olhos bondosos (semi-fechados) -->
  <rect x="13" y="9" width="3" height="1" fill="#5a3a20"/>
  <rect x="18" y="9" width="3" height="1" fill="#5a3a20"/>
  <!-- Sorriso suave -->
  <rect x="14" y="12" width="5" height="1" fill="#cd9b5f"/>

  <!-- CAPUZ dourado -->
  <rect x="10" y="5" width="14" height="4" fill="#c79a3a" opacity="0.6"/>
  <rect x="11" y="5" width="12" height="3" fill="#c79a3a"/>
  <!-- Gola alta -->
  <rect x="11" y="14" width="12" height="3" fill="#c79a3a"/>

  <!-- VESTES sagradas: largas e fluidas -->
  <rect x="10" y="17" width="14" height="5" fill="#ffd96a"/>
  <!-- Símbolo sagrado no peito -->
  <rect x="15" y="18" width="2" height="8" fill="#c79a3a"/>
  <rect x="13" y="21" width="6" height="2" fill="#c79a3a"/>
  <!-- Corpo das vestes alargando -->
  <rect x="9" y="22" width="16" height="5" fill="#fff4b8"/>
  <rect x="8" y="27" width="18" height="5" fill="#ffd96a"/>
  <rect x="7" y="32" width="20" height="5" fill="#fff4b8"/>
  <rect x="8" y="37" width="18" height="5" fill="#c79a3a"/>

  <!-- BORDADO inferior dourado -->
  <rect x="7" y="42" width="8" height="4" fill="#c79a3a"/>
  <rect x="17" y="42" width="8" height="4" fill="#c79a3a"/>
  <rect x="7" y="44" width="8" height="2" fill="#ffd96a"/>
  <rect x="17" y="44" width="8" height="2" fill="#ffd96a"/>
  <!-- Sandálias -->
  <rect x="6" y="46" width="9" height="2" fill="#8a6020"/>
  <rect x="17" y="46" width="9" height="2" fill="#8a6020"/>
</svg>
