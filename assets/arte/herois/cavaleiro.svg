<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Elmo completo - identidade visual principal -->
  <rect x="12" y="1" width="8" height="2" fill="#6aa0ff"/>
  <rect x="10" y="3" width="12" height="2" fill="#6aa0ff"/>
  <rect x="9" y="5" width="14" height="8" fill="#6aa0ff"/>
  <rect x="9" y="5" width="14" height="10" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <!-- Viseira (visor) - o traço definidor do cavaleiro -->
  <rect x="10" y="10" width="12" height="2" fill="#1a2a3a"/>
  <rect x="10" y="10" width="12" height="2" fill="none" stroke="#0d0f1a" stroke-width="0.5"/>
  <!-- Destaque metálico no elmo -->
  <rect x="11" y="6" width="5" height="3" fill="#b8d4ff"/>
  <!-- Proteção do pescoço -->
  <rect x="11" y="14" width="10" height="3" fill="#3a63b8"/>

  <!-- Pauldrons (ombros largos) - dão presença ao personagem -->
  <rect x="3" y="15" width="9" height="6" rx="1" fill="#6aa0ff"/>
  <rect x="3" y="15" width="9" height="6" rx="1" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <rect x="20" y="15" width="9" height="6" rx="1" fill="#6aa0ff"/>
  <rect x="20" y="15" width="9" height="6" rx="1" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <!-- Highlights dos ombros -->
  <rect x="4" y="16" width="4" height="2" fill="#b8d4ff"/>
  <rect x="21" y="16" width="4" height="2" fill="#b8d4ff"/>

  <!-- Peitoral (breastplate) -->
  <rect x="9" y="17" width="14" height="16" fill="#6aa0ff"/>
  <rect x="9" y="17" width="14" height="16" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <!-- Detalhes do peitoral -->
  <rect x="9" y="23" width="14" height="1" fill="#3a63b8"/>
  <rect x="15" y="17" width="1" height="16" fill="#3a63b8"/>
  <!-- Rebite central -->
  <rect x="14" y="19" width="3" height="3" fill="#b8d4ff"/>

  <!-- Escudo (identidade secundária: cavaleiro sempre tem escudo) -->
  <rect x="2" y="17" width="8" height="12" rx="1" fill="#3a63b8"/>
  <rect x="2" y="17" width="8" height="12" rx="1" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <!-- Cruz do escudo -->
  <rect x="5" y="18" width="2" height="10" fill="#6aa0ff"/>
  <rect x="3" y="23" width="6" height="2" fill="#6aa0ff"/>
  <!-- Highlight do escudo -->
  <rect x="3" y="18" width="3" height="3" fill="#b8d4ff"/>

  <!-- Espada (empunhada à direita) -->
  <rect x="23" y="10" width="2" height="20" fill="#b8d4ff"/>
  <rect x="21" y="16" width="6" height="2" fill="#3a63b8"/>
  <rect x="23" y="28" width="2" height="4" fill="#c79a3a"/>
  <rect x="23" y="10" width="2" height="20" fill="none" stroke="#0d0f1a" stroke-width="0.5"/>

  <!-- Cinto -->
  <rect x="9" y="33" width="14" height="3" fill="#2a1a0a"/>
  <rect x="14" y="33" width="4" height="3" fill="#c79a3a"/>

  <!-- Greaves (caneleiras) -->
  <rect x="9" y="36" width="6" height="10" rx="1" fill="#3a63b8"/>
  <rect x="17" y="36" width="6" height="10" rx="1" fill="#3a63b8"/>
  <!-- Proteção do joelho -->
  <rect x="10" y="40" width="4" height="3" fill="#6aa0ff"/>
  <rect x="18" y="40" width="4" height="3" fill="#6aa0ff"/>
  <!-- Contornos das pernas -->
  <rect x="9" y="36" width="6" height="10" rx="1" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <rect x="17" y="36" width="6" height="10" rx="1" fill="none" stroke="#0d0f1a" stroke-width="1"/>
  <!-- Sapatões -->
  <rect x="8" y="46" width="8" height="2" rx="1" fill="#3a63b8"/>
  <rect x="16" y="46" width="8" height="2" rx="1" fill="#3a63b8"/>
</svg>
