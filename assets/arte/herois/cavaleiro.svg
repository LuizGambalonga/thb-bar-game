<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- ESPADA: elemento dominante, prata brilhante, visível antes de tudo -->
  <rect x="24" y="0" width="4" height="34" fill="#d8e4f8"/>
  <rect x="24" y="0" width="2" height="32" fill="#ffffff" opacity="0.55"/>
  <!-- Guarda da espada -->
  <rect x="21" y="14" width="10" height="3" fill="#3a63b8"/>
  <rect x="22" y="17" width="8" height="2" fill="#6aa0ff"/>
  <!-- Punho -->
  <rect x="25" y="34" width="2" height="6" fill="#c79a3a"/>
  <rect x="24" y="40" width="4" height="3" fill="#9a7020"/>

  <!-- ELMO fechado — identidade do cavaleiro -->
  <rect x="10" y="2" width="12" height="14" fill="#6aa0ff"/>
  <rect x="11" y="1" width="10" height="3" fill="#6aa0ff"/>
  <!-- Viseira larga e escura — impossível de confundir -->
  <rect x="11" y="10" width="10" height="5" fill="#1a2a3a"/>
  <rect x="12" y="11" width="8" height="3" fill="#0a1520"/>
  <!-- Destaque metálico -->
  <rect x="11" y="3" width="5" height="5" fill="#b8d4ff"/>
  <!-- Proteção do pescoço -->
  <rect x="12" y="16" width="8" height="3" fill="#3a63b8"/>

  <!-- OMBROS LARGOS -->
  <rect x="5" y="15" width="8" height="7" rx="1" fill="#6aa0ff"/>
  <rect x="19" y="15" width="8" height="7" rx="1" fill="#6aa0ff"/>
  <rect x="6" y="16" width="4" height="3" fill="#b8d4ff" opacity="0.5"/>

  <!-- CORPO blindado -->
  <rect x="9" y="18" width="14" height="16" fill="#6aa0ff"/>
  <rect x="9" y="25" width="14" height="2" fill="#3a63b8"/>
  <rect x="15" y="18" width="2" height="16" fill="#3a63b8"/>

  <!-- GRANDE ESCUDO — segundo elemento dominante -->
  <rect x="0" y="16" width="10" height="18" rx="1" fill="#3a63b8"/>
  <rect x="1" y="17" width="8" height="16" fill="#4a73c8"/>
  <!-- Cruz heráldica -->
  <rect x="4" y="18" width="2" height="14" fill="#7aa0ff"/>
  <rect x="1" y="24" width="8" height="2" fill="#7aa0ff"/>
  <rect x="1" y="17" width="4" height="4" fill="#b8d4ff" opacity="0.5"/>

  <!-- CINTO -->
  <rect x="9" y="34" width="14" height="3" fill="#1a1008"/>
  <rect x="13" y="33" width="6" height="5" fill="#c79a3a"/>

  <!-- PERNAS armadas -->
  <rect x="9" y="37" width="6" height="10" fill="#3a63b8"/>
  <rect x="17" y="37" width="6" height="10" fill="#3a63b8"/>
  <rect x="10" y="41" width="4" height="5" fill="#6aa0ff"/>
  <rect x="18" y="41" width="4" height="5" fill="#6aa0ff"/>
  <!-- Botas -->
  <rect x="8" y="47" width="8" height="1" fill="#2a3a60"/>
  <rect x="16" y="47" width="8" height="1" fill="#2a3a60"/>
</svg>
