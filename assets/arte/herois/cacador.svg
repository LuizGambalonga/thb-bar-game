<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- BESTA: elemento dominante horizontal, primeiro plano -->
  <!-- Corpo da besta -->
  <rect x="0" y="18" width="14" height="7" rx="1" fill="#6a4a20"/>
  <!-- Canal de disparo -->
  <rect x="0" y="20" width="13" height="3" fill="#3a2810"/>
  <!-- Braços da besta (curva de tiro) -->
  <rect x="0" y="17" width="12" height="2" fill="#5a3a10"/>
  <rect x="0" y="25" width="12" height="2" fill="#5a3a10"/>
  <!-- Pontas dos braços (tensão) -->
  <rect x="0" y="16" width="3" height="2" fill="#4a2808"/>
  <rect x="0" y="27" width="3" height="2" fill="#4a2808"/>
  <!-- Corda tensa -->
  <rect x="0" y="18" width="1" height="8" fill="#e0d8c0"/>
  <!-- VIROTE (bolt) pronto para disparar — elemento de ação -->
  <rect x="0" y="21" width="10" height="1" fill="#d0d8f0"/>
  <rect x="9" y="20" width="3" height="3" fill="#8090a0" opacity="0.8"/>
  <!-- Mecanismo de gatilho -->
  <rect x="8" y="23" width="4" height="3" fill="#3aa9b8"/>

  <!-- CAPUZ fechado — nenhuma pele visível (misterioso) -->
  <rect x="10" y="2" width="14" height="3" fill="#1a3a3a"/>
  <rect x="9" y="5" width="16" height="9" fill="#1a3a3a"/>
  <!-- Máscara (cobre o rosto todo) -->
  <rect x="10" y="6" width="14" height="8" fill="#0f2828"/>
  <!-- OLHOS sobrenarurais — únicos elementos de cor no rosto -->
  <rect x="11" y="9" width="4" height="2" fill="#6cf2ff"/>
  <rect x="17" y="9" width="4" height="2" fill="#6cf2ff"/>
  <rect x="11" y="9" width="2" height="1" fill="#ffffff"/>
  <rect x="17" y="9" width="2" height="1" fill="#ffffff"/>
  <!-- Envoltura lateral -->
  <rect x="9" y="7" width="2" height="8" fill="#2a5a5a" opacity="0.7"/>
  <rect x="21" y="7" width="2" height="8" fill="#2a5a5a" opacity="0.7"/>

  <!-- GOLA alta -->
  <rect x="11" y="14" width="12" height="3" fill="#1a3a3a"/>

  <!-- ARMADURA de couro teal -->
  <rect x="10" y="17" width="14" height="14" fill="#3aa9b8"/>
  <rect x="10" y="22" width="14" height="1" fill="#1a6070"/>
  <rect x="10" y="26" width="14" height="1" fill="#1a6070"/>
  <rect x="15" y="17" width="2" height="14" fill="#1a6070"/>
  <!-- Highlight -->
  <rect x="11" y="18" width="4" height="4" fill="#6cf2ff" opacity="0.3"/>

  <!-- CINTURÃO utilitário -->
  <rect x="10" y="31" width="14" height="3" fill="#1a3a3a"/>
  <!-- Bolsas laterais (tools do caçador) -->
  <rect x="10" y="29" width="4" height="5" fill="#0f2828"/>
  <rect x="20" y="29" width="4" height="5" fill="#0f2828"/>
  <rect x="13" y="30" width="4" height="4" fill="#3aa9b8"/>

  <!-- PERNAS infiltração -->
  <rect x="10" y="34" width="6" height="12" fill="#1a3a3a"/>
  <rect x="18" y="34" width="6" height="12" fill="#1a3a3a"/>
  <rect x="10" y="38" width="6" height="8" fill="#3aa9b8"/>
  <rect x="18" y="38" width="6" height="8" fill="#3aa9b8"/>
  <!-- Botas silenciosas -->
  <rect x="9" y="46" width="8" height="2" fill="#0f2828"/>
  <rect x="17" y="46" width="8" height="2" fill="#0f2828"/>
</svg>
